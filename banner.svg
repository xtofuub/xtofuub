<svg width="900" height="220" viewBox="0 0 900 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&amp;display=swap');

      .bg { fill: #080808; }
      .grid-line { stroke: #1a0000; stroke-width: 0.5; }
      .border { stroke: #cc0000; stroke-width: 1.2; fill: none; }
      .border-dim { stroke: #550000; stroke-width: 0.6; fill: none; }
      .name-text {
        font-family: 'Share Tech Mono', 'Courier New', monospace;
        font-size: 62px;
        font-weight: bold;
        fill: #f5f5f5;
        letter-spacing: 12px;
      }
      .sub-text {
        font-family: 'Share Tech Mono', 'Courier New', monospace;
        font-size: 13px;
        fill: #cc0000;
        letter-spacing: 3px;
      }
      .accent-text {
        font-family: 'Share Tech Mono', 'Courier New', monospace;
        font-size: 11px;
        fill: #440000;
        letter-spacing: 1.5px;
      }
      .prompt {
        font-family: 'Share Tech Mono', 'Courier New', monospace;
        font-size: 11px;
        fill: #661111;
        letter-spacing: 1px;
      }
      .corner { stroke: #cc0000; stroke-width: 2; fill: none; }
      .scan {
        fill: url(#scanGrad);
        animation: scan 3.5s linear infinite;
      }
      @keyframes scan {
        0%   { transform: translateY(-220px); }
        100% { transform: translateY(220px); }
      }
      .flicker {
        animation: flicker 6s ease-in-out infinite;
      }
      @keyframes flicker {
        0%, 90%, 100%   { opacity: 1; }
        91%  { opacity: 0.4; }
        92%  { opacity: 1; }
        94%  { opacity: 0.3; }
        96%  { opacity: 1; }
      }
      .blink {
        animation: blink 1.1s step-start infinite;
      }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
      .pulse-dot {
        animation: pulse 2s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.3; r: 2; }
        50% { opacity: 1; r: 3.5; }
      }
      .dot-seq-1 { animation: pulse 2s 0s ease-in-out infinite; }
      .dot-seq-2 { animation: pulse 2s 0.35s ease-in-out infinite; }
      .dot-seq-3 { animation: pulse 2s 0.7s ease-in-out infinite; }
      .side-text {
        font-family: 'Share Tech Mono', 'Courier New', monospace;
        font-size: 9px;
        fill: #2a0000;
        letter-spacing: 2px;
        writing-mode: tb;
      }
      .glitch {
        animation: glitch 8s linear infinite;
      }
      @keyframes glitch {
        0%, 94%, 100% { transform: translate(0,0); clip-path: none; }
        95% { transform: translate(-3px, 1px); }
        96% { transform: translate(3px, -1px); }
        97% { transform: translate(0px, 2px); }
        98% { transform: translate(-2px, 0px); }
      }
    </style>

    <linearGradient id="scanGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#cc0000" stop-opacity="0"/>
      <stop offset="50%" stop-color="#cc0000" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#cc0000" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="nameGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#cccccc"/>
    </linearGradient>

    <clipPath id="clip">
      <rect x="0" y="0" width="900" height="220"/>
    </clipPath>
  </defs>

  <rect class="bg" x="0" y="0" width="900" height="220"/>

  <!-- Grid lines horizontal -->
  <line class="grid-line" x1="0" y1="40" x2="900" y2="40"/>
  <line class="grid-line" x1="0" y1="80" x2="900" y2="80"/>
  <line class="grid-line" x1="0" y1="120" x2="900" y2="120"/>
  <line class="grid-line" x1="0" y1="160" x2="900" y2="160"/>
  <line class="grid-line" x1="0" y1="200" x2="900" y2="200"/>

  <!-- Grid lines vertical -->
  <line class="grid-line" x1="100" y1="0" x2="100" y2="220"/>
  <line class="grid-line" x1="200" y1="0" x2="200" y2="220"/>
  <line class="grid-line" x1="300" y1="0" x2="300" y2="220"/>
  <line class="grid-line" x1="400" y1="0" x2="400" y2="220"/>
  <line class="grid-line" x1="500" y1="0" x2="500" y2="220"/>
  <line class="grid-line" x1="600" y1="0" x2="600" y2="220"/>
  <line class="grid-line" x1="700" y1="0" x2="700" y2="220"/>
  <line class="grid-line" x1="800" y1="0" x2="800" y2="220"/>

  <!-- Scan line overlay -->
  <rect clip-path="url(#clip)" x="0" y="0" width="900" height="60" class="scan"/>

  <!-- Top red accent bar -->
  <rect x="0" y="0" width="900" height="3" fill="#cc0000"/>

  <!-- Bottom red accent bar -->
  <rect x="0" y="217" width="900" height="3" fill="#330000"/>

  <!-- Left vertical accent -->
  <rect x="0" y="0" width="2" height="220" fill="#330000"/>

  <!-- Right vertical accent -->
  <rect x="898" y="0" width="2" height="220" fill="#330000"/>

  <!-- Corner brackets - top left -->
  <polyline class="corner" points="20,40 20,20 40,20"/>
  <polyline class="border-dim" points="45,40 45,45 40,45"/>

  <!-- Corner brackets - top right -->
  <polyline class="corner" points="880,40 880,20 860,20"/>
  <polyline class="border-dim" points="855,40 855,45 860,45"/>

  <!-- Corner brackets - bottom left -->
  <polyline class="corner" points="20,180 20,200 40,200"/>
  <polyline class="border-dim" points="45,180 45,175 40,175"/>

  <!-- Corner brackets - bottom right -->
  <polyline class="corner" points="880,180 880,200 860,200"/>
  <polyline class="border-dim" points="855,180 855,175 860,175"/>

  <!-- Red side deco left -->
  <rect x="14" y="85" width="2" height="50" fill="#cc0000"/>
  <rect x="14" y="85" width="6" height="2" fill="#cc0000"/>
  <rect x="14" y="133" width="6" height="2" fill="#cc0000"/>

  <!-- Red side deco right -->
  <rect x="884" y="85" width="2" height="50" fill="#cc0000"/>
  <rect x="880" y="85" width="6" height="2" fill="#cc0000"/>
  <rect x="880" y="133" width="6" height="2" fill="#cc0000"/>

  <!-- Top prompt text -->
  <text class="prompt" x="55" y="16">root@xtofuub:~$</text>
  <text class="accent-text" x="200" y="16">// initializing...</text>

  <!-- Pulsing dots top right -->
  <circle class="dot-seq-1" cx="800" cy="13" r="2.5" fill="#cc0000"/>
  <circle class="dot-seq-2" cx="812" cy="13" r="2.5" fill="#cc0000"/>
  <circle class="dot-seq-3" cx="824" cy="13" r="2.5" fill="#cc0000"/>

  <!-- MAIN NAME -->
  <g class="flicker">
    <text class="name-text glitch" x="450" y="128" text-anchor="middle" fill="url(#nameGlow)">XTOFUUB</text>
  </g>

  <!-- Name shadow/glow layer (behind) -->
  <text class="name-text" x="450" y="128" text-anchor="middle" fill="#cc0000" opacity="0.08" font-size="66px" letter-spacing="14px">XTOFUUB</text>

  <!-- Subtitle line -->
  <line x1="140" y1="150" x2="340" y2="150" stroke="#330000" stroke-width="0.8"/>
  <text class="sub-text" x="450" y="163" text-anchor="middle">RED TEAM  //  REVERSE ENGINEER  //  BUILDER</text>
  <line x1="560" y1="150" x2="760" y2="150" stroke="#330000" stroke-width="0.8"/>

  <!-- Bottom status bar -->
  <text class="prompt" x="55" y="206">[ COMPUTER ENGINEERING ]</text>
  <text class="accent-text" x="350" y="206">KALI LINUX  ·  PYTHON  ·  POWERSHELL</text>

  <!-- Blinking cursor bottom right -->
  <rect class="blink" x="820" y="196" width="8" height="13" fill="#cc0000"/>

  <!-- Version label top right corner -->
  <text class="accent-text" x="845" y="16">v2.0</text>

  <!-- Decorative circuit lines left -->
  <polyline class="border-dim" fill="none" points="60,55 60,70 80,70 80,80 100,80"/>
  <circle cx="60" cy="55" r="2" fill="#330000"/>
  <circle cx="100" cy="80" r="2" fill="#550000"/>

  <!-- Decorative circuit lines right -->
  <polyline class="border-dim" fill="none" points="840,55 840,70 820,70 820,80 800,80"/>
  <circle cx="840" cy="55" r="2" fill="#330000"/>
  <circle cx="800" cy="80" r="2" fill="#550000"/>
</svg>
