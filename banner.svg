<svg width="100%" viewBox="0 0 900 220" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&amp;display=swap');
      .bg { fill: #080808; }
      .grid-line { stroke: #1a0000; stroke-width: 0.5; }
      .name-text {
        font-family: 'Share Tech Mono', 'Courier New', monospace;
        font-size: 62px;
        font-weight: bold;
        fill: #f0f0f0;
        letter-spacing: 12px;
      }
      .sub-text {
        font-family: 'Share Tech Mono', 'Courier New', monospace;
        font-size: 13px;
        fill: #cc0000;
        letter-spacing: 3px;
      }
      .prompt {
        font-family: 'Share Tech Mono', 'Courier New', monospace;
        font-size: 11px;
        fill: #661111;
        letter-spacing: 1px;
      }
      .accent-text {
        font-family: 'Share Tech Mono', 'Courier New', monospace;
        font-size: 10px;
        fill: #3a0000;
        letter-spacing: 1.5px;
      }
      .corner { stroke: #cc0000; stroke-width: 2; fill: none; }
      .scanAnim { animation: scan 4s linear infinite; }
      @keyframes scan {
        0%   { transform: translateY(-220px); }
        100% { transform: translateY(440px); }
      }
      .flicker { animation: flicker 7s ease-in-out infinite; }
      @keyframes flicker {
        0%,88%,100% { opacity:1; }
        89% { opacity:0.3; }
        90% { opacity:1; }
        92% { opacity:0.2; }
        93% { opacity:1; }
      }
      .blink { animation: blink 1.1s step-start infinite; }
      @keyframes blink {
        0%,100% { opacity:1; }
        50% { opacity:0; }
      }
      .pulse1 { animation: pulse 2s 0s ease-in-out infinite; }
      .pulse2 { animation: pulse 2s 0.4s ease-in-out infinite; }
      .pulse3 { animation: pulse 2s 0.8s ease-in-out infinite; }
      @keyframes pulse {
        0%,100% { opacity:0.2; }
        50% { opacity:1; }
      }
      .glitch { animation: glitch 9s linear infinite; }
      @keyframes glitch {
        0%,93%,100% { transform:translate(0,0); }
        94% { transform:translate(-3px,1px); }
        95% { transform:translate(3px,-1px); }
        96% { transform:translate(0,2px); }
        97% { transform:translate(-2px,0); }
      }
      .sidepulse { animation: sidepulse 3s ease-in-out infinite; }
      @keyframes sidepulse {
        0%,100% { opacity:0.4; }
        50% { opacity:1; }
      }
    </style>
    <linearGradient id="scanGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#cc0000" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#cc0000" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#cc0000" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="clip">
      <rect x="0" y="0" width="900" height="220"/>
    </clipPath>
  </defs>

  <rect class="bg" x="0" y="0" width="900" height="220"/>

  <!-- Grid -->
  <line class="grid-line" x1="0"   y1="44"  x2="900" y2="44"/>
  <line class="grid-line" x1="0"   y1="88"  x2="900" y2="88"/>
  <line class="grid-line" x1="0"   y1="132" x2="900" y2="132"/>
  <line class="grid-line" x1="0"   y1="176" x2="900" y2="176"/>
  <line class="grid-line" x1="90"  y1="0"   x2="90"  y2="220"/>
  <line class="grid-line" x1="180" y1="0"   x2="180" y2="220"/>
  <line class="grid-line" x1="270" y1="0"   x2="270" y2="220"/>
  <line class="grid-line" x1="360" y1="0"   x2="360" y2="220"/>
  <line class="grid-line" x1="450" y1="0"   x2="450" y2="220"/>
  <line class="grid-line" x1="540" y1="0"   x2="540" y2="220"/>
  <line class="grid-line" x1="630" y1="0"   x2="630" y2="220"/>
  <line class="grid-line" x1="720" y1="0"   x2="720" y2="220"/>
  <line class="grid-line" x1="810" y1="0"   x2="810" y2="220"/>

  <!-- Scan line -->
  <rect clip-path="url(#clip)" class="scanAnim" x="0" y="0" width="900" height="80" fill="url(#scanGrad)"/>

  <!-- Edges -->
  <rect x="0"   y="0" width="900" height="3"   fill="#cc0000"/>
  <rect x="0"   y="217" width="900" height="3" fill="#550000"/>
  <rect x="0"   y="0" width="3"   height="220" fill="#1a0000"/>
  <rect x="897" y="0" width="3"   height="220" fill="#1a0000"/>

  <!-- Side accent bars -->
  <rect class="sidepulse" x="10" y="60" width="2" height="100" fill="#cc0000"/>
  <rect x="10" y="60"  width="8" height="2" fill="#cc0000"/>
  <rect x="10" y="158" width="8" height="2" fill="#cc0000"/>
  <rect class="sidepulse" x="888" y="60" width="2" height="100" fill="#cc0000"/>
  <rect x="882" y="60"  width="8" height="2" fill="#cc0000"/>
  <rect x="882" y="158" width="8" height="2" fill="#cc0000"/>

  <!-- Corner brackets -->
  <polyline class="corner" points="28,44 28,22 50,22"/>
  <polyline class="corner" points="872,44 872,22 850,22"/>
  <polyline class="corner" points="28,176 28,198 50,198"/>
  <polyline class="corner" points="872,176 872,198 850,198"/>

  <!-- Top bar text -->
  <text class="prompt" x="58" y="15">root@xtofuub:~$</text>
  <text class="accent-text" x="210" y="15">// initializing profile...</text>

  <!-- Pulse dots -->
  <circle class="pulse1" cx="810" cy="13" r="3" fill="#cc0000"/>
  <circle class="pulse2" cx="824" cy="13" r="3" fill="#cc0000"/>
  <circle class="pulse3" cx="838" cy="13" r="3" fill="#cc0000"/>

  <!-- Name glow -->
  <text class="name-text" x="450" y="126" text-anchor="middle" fill="#cc0000" opacity="0.07" font-size="68px" letter-spacing="14px">XTOFUUB</text>

  <!-- Main name -->
  <g class="flicker">
    <text class="name-text glitch" x="450" y="126" text-anchor="middle">XTOFUUB</text>
  </g>

  <!-- Subtitle dividers -->
  <line x1="30"  y1="148" x2="220" y2="148" stroke="#2a0000" stroke-width="0.8"/>
  <line x1="680" y1="148" x2="870" y2="148" stroke="#2a0000" stroke-width="0.8"/>

  <!-- Subtitle -->
  <text class="sub-text" x="450" y="162" text-anchor="middle">SECURITY  //  REVERSE ENGINEERING  //  BUILDER</text>

  <!-- Bottom bar -->
  <text class="prompt" x="30" y="208">[ COMPUTER ENGINEERING ]</text>
  <text class="accent-text" x="460" y="208">KALI  ·  PYTHON  ·  POWERSHELL  ·  BURP SUITE</text>

  <!-- Blinking cursor -->
  <rect class="blink" x="856" y="197" width="9" height="13" fill="#cc0000"/>
</svg>
